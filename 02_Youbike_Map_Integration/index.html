<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 2.0 Live Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <div class="header">
            <h1 data-i18n="title">YouBike 2.0 台北市即時資訊</h1>
            <div class="controls">
                <button id="btn_locate" class="btn-secondary">📍 <span data-i18n="locate">定位目前位置</span></button>
                <button id="btn_lang" class="btn-secondary">🌐 English</button>

                <div class="divider"></div>

                <button id="btn_request"><span data-i18n="refresh">手動更新資料</span></button>

                <span class="info-wrapper">
                    <span data-i18n="last_update">最後更新: </span>
                    <span id="update-time">--:--:--</span>
                </span>

                <label>
                    <input type="checkbox" id="auto-update" checked>
                    <span data-i18n="auto_update">啟用自動更新 (每1分鐘)</span>
                </label>
            </div>
        </div>

        <div id="map"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th data-i18n="col_status">狀態</th>
                        <th data-i18n="col_sno">站點代號</th>
                        <th data-i18n="col_sna">站點名稱</th>
                        <th data-i18n="col_area">區域</th>
                        <th data-i18n="col_addr">地址</th>
                        <th data-i18n="col_total">總車位</th>
                        <th data-i18n="col_rent">可借</th>
                        <th data-i18n="col_return">可還</th>
                        <th data-i18n="col_time">更新時間</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="js/script.js"></script>
</body>

</html>
